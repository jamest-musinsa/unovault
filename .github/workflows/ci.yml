# CI pipeline for unovault-core.
#
# Runs the same commands the CLAUDE.md "Build + test commands" section
# documents, so local and CI stay in sync. The panic policy lints
# (unwrap_used, expect_used, panic, todo, unimplemented) are enforced
# here via `clippy -D warnings`, which is the only way the denies in
# Cargo.toml actually gate merges.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Fail on any clippy warning. Denies in Cargo.toml fire here.
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel — rustup honors it on first
      # cargo invocation. No explicit toolchain setup step needed.
      - name: Show Rust version
        run: rustc --version && cargo --version

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --workspace --all-features

      - name: doc (check intra-doc links)
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  swift-bridge:
    name: swift FFI smoke test
    runs-on: macos-14
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift + Rust versions
        run: swift --version && rustc --version

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ffi-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ffi-
            ${{ runner.os }}-cargo-

      - name: Build FFI cdylib
        run: cargo build -p unovault-ffi

      - name: Regenerate Swift bindings
        run: |
          cargo run -p uniffi-bindgen -- generate \
            --library target/debug/libunovault_ffi.dylib \
            --language swift \
            --out-dir swift/generated
          cp swift/generated/unovault_ffi.swift \
             swift/UnovaultFFI/Sources/UnovaultFFI/UnovaultFFI.swift
          cp swift/generated/unovault_ffiFFI.h \
             swift/UnovaultFFI/Sources/UnovaultFFIC/unovault_ffiFFI.h

      - name: Check bindings are in sync with committed copies
        run: |
          if ! git diff --quiet swift/UnovaultFFI/Sources/UnovaultFFI/UnovaultFFI.swift swift/UnovaultFFI/Sources/UnovaultFFIC/unovault_ffiFFI.h; then
            echo "ERROR: Swift bindings in swift/UnovaultFFI/ are out of sync with crates/unovault-ffi."
            echo "Run the regeneration snippet in CLAUDE.md and commit the result."
            exit 1
          fi

      - name: Swift test
        working-directory: swift/UnovaultFFI
        run: swift test

  supply-chain:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
